version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: de_assist_db
    environment:
      POSTGRES_USER: ${DB_USER:-de_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-de_assist}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # The main application handles setup and ingestion
  app:
    build: .
    container_name: de_assist_app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      - db

  # The Telegram bot service
  bot:
    build: .
    container_name: de_assist_bot
    command: ["telegram-bot"]
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
    volumes:
      - ./config:/app/config
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
